<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAV Monitoring System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">🚁 UAV Monitoring System</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">Welcome, {{ user.username }}</span>
                <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Monitoring Panel</h5>
                            <div class="d-flex gap-2">
                                <select id="modelSelect" class="form-select form-select-sm" style="width: auto;">
                                    {% for model in available_models %}
                                    <option value="{{ model }}" {% if model == current_model %}selected{% endif %}>
                                        {{ model }}
                                    </option>
                                    {% endfor %}
                                </select>
                                <button id="switchModelBtn" class="btn btn-sm btn-outline-primary">Switch Model</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <input type="file" id="fileInput" class="form-control" accept="image/*,video/*">
                        </div>
                        <button id="detectBtn" class="btn btn-primary">Start Detection</button>
                        <div id="loading" class="mt-3 d-none">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Processing...</span>
                            </div>
                            <span class="ms-2">Processing...</span>
                        </div>
                        <div class="mt-3">
                            <div class="mb-3">
                                <label class="form-label">Detection Interval (ms)</label>
                                <input type="number" id="detectInterval" class="form-control" value="100" min="10" max="1000">
                                <small class="text-muted">Smaller value means more frequent detection, but higher CPU usage</small>
                            </div>
                        </div>
                        <div class="mt-4">
                            <div id="imagePreview" class="preview-container">
                                <div id="cameraPlaceholder" class="camera-placeholder">Camera 1</div>
                                <img id="previewImg" src="" alt="Preview" class="img-fluid d-none">
                                <video id="previewVideo" class="img-fluid d-none" controls preload="metadata" playsinline></video>
                                <img id="streamImg" src="" alt="Video Stream" class="img-fluid d-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">Detection Results</h5>
                    </div>
                    <div class="card-body">
                        <div id="framesCarousel" class="carousel slide" data-bs-ride="carousel">
                            <div id="framesContainer" class="carousel-inner">
                                <div class="carousel-item active">
                                    <p class="text-muted text-center">No detection results</p>
                                </div>
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#framesCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon"></span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#framesCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Detected UAVs</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">History</label>
                            <select id="historySelect" class="form-select" onchange="showHistoryDetail(this.value)">
                                <option value="">-- No history --</option>
                            </select>
                        </div>
                        <div id="detectionsContainer">
                            <p class="text-muted text-center">No detection results</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">History Detail</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalFrameImg" src="" class="img-fluid mb-3" style="max-width: 640px;">
                    <div id="modalDetectionInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
